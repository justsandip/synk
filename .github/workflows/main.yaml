name: build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  semantic_pull_request:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/semantic_pull_request.yml@v1

  spell-check:
    uses: VeryGoodOpenSource/very_good_workflows/.github/workflows/spell_check.yml@v1
    with:
      includes: "**/*.md"
      modified_files_only: false

  changes:
    runs-on: ubuntu-latest
    outputs:
      synk: ${{ steps.filter.outputs.synk }}
      flutter_synk: ${{ steps.filter.outputs.flutter_synk }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            synk:
              - 'packages/synk/**'
              - '.github/workflows/main.yaml'
              - 'pubspec.yaml'
            flutter_synk:
              - 'packages/synk/**'
              - 'packages/flutter_synk/**'
              - '.github/workflows/main.yaml'
              - 'pubspec.yaml'

  build_and_test:
    needs: changes
    if: needs.changes.outputs.synk == 'true' || needs.changes.outputs.flutter_synk == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 📚 Git Checkout
        uses: actions/checkout@v6

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: 📦 Install Dependencies (Workspace)
        run: dart pub get
        working-directory: .

      - name: ✨ Check Formatting (Workspace)
        run: dart format --set-exit-if-changed .

      - name: 🕵️ Analyze (Workspace)
        run: dart analyze --fatal-infos --fatal-warnings .

      - name: 🧪 Run Tests (packages/synk)
        if: needs.changes.outputs.synk == 'true'
        run: |
          dart pub global activate coverage
          dart pub global run coverage:test_with_coverage
        working-directory: packages/synk

      - name: ⬆️ Upload coverage reports for synk
        if: needs.changes.outputs.synk == 'true'
        uses: codecov/codecov-action@v6
        env:
          PACKAGE_PATH: packages/synk
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Verify Coverage (packages/synk)
        if: needs.changes.outputs.synk == 'true'
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: packages/synk/coverage/lcov.info
          min_coverage: 100

      - name: 💯 Verify Pub Score (packages/synk)
        if: needs.changes.outputs.synk == 'true'
        shell: bash
        working-directory: packages/synk
        run: |
          dart pub global activate pana
          sudo apt-get install webp
          PANA=$(pana . --no-warning)
          PANA_SCORE=$(echo "$PANA" | sed -n "s/.*Points: \([0-9]*\)\/\([0-9]*\).*/\1\/\2/p")
          echo "$PANA"
          IFS='/' read -r -a SCORE_ARR <<< "$PANA_SCORE"
          SCORE="${SCORE_ARR[0]}"
          TOTAL="${SCORE_ARR[1]}"
          if [ -z "$SCORE" ] || [ -z "$TOTAL" ]; then echo "Failed to parse pana score!"; exit 1; fi
          MINIMUM_SCORE=$TOTAL
          if (( SCORE < MINIMUM_SCORE )); then echo "minimum score $MINIMUM_SCORE was not met (got $SCORE)!"; exit 1; fi

      - name: 🧪 Run Tests (packages/flutter_synk)
        if: needs.changes.outputs.flutter_synk == 'true'
        run: flutter test --coverage
        working-directory: packages/flutter_synk

      - name: ⬆️ Upload coverage reports for flutter_synk
        if: needs.changes.outputs.flutter_synk == 'true'
        uses: codecov/codecov-action@v6
        env:
          PACKAGE_PATH: packages/flutter_synk
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Verify Coverage (packages/flutter_synk)
        if: needs.changes.outputs.flutter_synk == 'true'
        uses: VeryGoodOpenSource/very_good_coverage@v3
        with:
          path: packages/flutter_synk/coverage/lcov.info
          min_coverage: 100

      - name: 💯 Verify Pub Score (packages/flutter_synk)
        if: needs.changes.outputs.flutter_synk == 'true'
        shell: bash
        working-directory: packages/flutter_synk
        run: |
          LOCAL_SYNK_VERSION=$(grep "^version: " ../synk/pubspec.yaml | awk '{print $2}')
          PUB_SYNK_VERSION=$(curl -s "https://pub.dev/api/packages/synk" | grep '"version"' -m 1 | sed -E 's/.*"version":"([^"]+)".*/\1/')
          
          if [ "$LOCAL_SYNK_VERSION" != "$PUB_SYNK_VERSION" ]; then
            echo "Skipping Pana for flutter_synk because local synk ($LOCAL_SYNK_VERSION) is not yet published to pub.dev (latest is $PUB_SYNK_VERSION)."
            exit 0
          fi

          dart pub global activate pana
          sudo apt-get install webp
          PANA=$(pana . --no-warning)
          PANA_SCORE=$(echo "$PANA" | sed -n "s/.*Points: \([0-9]*\)\/\([0-9]*\).*/\1\/\2/p")
          echo "$PANA"
          IFS='/' read -r -a SCORE_ARR <<< "$PANA_SCORE"
          SCORE="${SCORE_ARR[0]}"
          TOTAL="${SCORE_ARR[1]}"
          if [ -z "$SCORE" ] || [ -z "$TOTAL" ]; then echo "Failed to parse pana score!"; exit 1; fi
          MINIMUM_SCORE=$TOTAL
          if (( SCORE < MINIMUM_SCORE )); then echo "minimum score $MINIMUM_SCORE was not met (got $SCORE)!"; exit 1; fi
